[tool.flet]
org = "com.nettest"
product = "NetTest Professional"
company = "NetTest"
copyright = "2025 NetTest"

[tool.flet.app]
module = "main"

[tool.flet.android]
min_sdk_version = 21
target_sdk_version = 33
permissions = [
    "android.permission.INTERNET",
    "android.permission.ACCESS_NETWORK_STATE",
    "android.permission.ACCESS_WIFI_STATE",
]

[tool.flet.dependencies]
speedtest-cli = ">=2.1.3"
certifi = "*"
urllib3 = "*"
charset-normalizer = "*"
idna = "*"
