name: Build NetTest APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            curl git unzip zip \
            libglu1-mesa ninja-build \
            libgtk-3-dev

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: Instalar Flet CLI
        run: pip install flet==0.27.6

      - name: Verificar versões
        run: |
          python --version
          flutter --version
          flet --version

      - name: Aceitar licenças Android
        run: yes | flutter doctor --android-licenses || true

      - name: Cache pub (Flutter)
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Build APK
        run: |
          flet build apk \
            --project "NetTest Professional" \
            --org com.nettest \
            --build-number 1 \
            --build-version 1.0.0

      - name: Listar arquivos gerados
        run: find build -name "*.apk" 2>/dev/null || echo "Nenhum APK encontrado"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NetTest-APK
          path: build/apk/*.apk
          if-no-files-found: error
          retention-days: 30
